[project]
name = "award-extractor"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "beautifulsoup4>=4.15.0",
    "gradio>=6.1.0",
    "ipykernel>=7.3.0",
    "jupyter>=1.1.1",
    "lxml>=6.1.1",
    "openai>=2.13.0",
    "pandas>=3.0.3",
    "pytest>=9.1.0",
    "python-dotenv>=1.2.1",
    "requests>=2.34.2",
]

[project.scripts]
classify-payments = "src.payment_clause_classifier:main"
interpret-overtime = "src.overtime_interpretation:main"
summarize-overtime = "src.overtime_entitlement_summary:main"
generate-overtime-pseudocode = "src.core_overtime_pseudocode:main"
generate-overtime-clause = "src.overtime_clause_generator:main"

[build-system]
requires = ["setuptools>=82.0.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["src*"]
